"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_mocha"
add_newline = true

format = """
$os$username\
$directory\
$git_branch$git_status$git_metrics\
$fill\
$nodejs$python$rust$golang$java$lua$docker_context$package\
$cmd_duration$time
$character"""

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

[fill]
symbol = " "
style = "surface1"

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[os]
disabled = false
style = "bold mauve"
format = "[$symbol ]($style)"

[os.symbols]
Linux    = "🐧"
Macos    = ""
Windows  = "🪟"
Arch     = "󰣇"
Ubuntu   = ""
Debian   = ""
Fedora   = ""

[username]
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style) "
show_always = false

[directory]
style = "bold blue"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
"Desktop"   = "󰇄 "
"Projects"  = "󰲋 "

[git_branch]
symbol = " "
style = "bold mauve"
format = "[on](subtext0) [$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "🏳"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "bold yellow"
format = "[$symbol($version )(\\($virtualenv\\) )]($style)"

[rust]
symbol = " "
style = "bold red"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style = "bold sapphire"
format = "[$symbol($version )]($style)"

[java]
symbol = " "
style = "bold peach"
format = "[$symbol($version )]($style)"

[lua]
symbol = " "
style = "bold blue"
format = "[$symbol($version )]($style)"

[docker_context]
symbol = " "
style = "bold sapphire"
format = "[$symbol$context]($style) "
only_with_files = true

[package]
symbol = "󰏗 "
style = "bold peach"
format = "[$symbol$version]($style) "

[cmd_duration]
min_time = 500
style = "bold yellow"
format = "[took $duration]($style) "

[time]
disabled = false
time_format = "%R"
style = "bold overlay0"
format = "[$time]($style) "

[battery]
disabled = false
full_symbol = "🔋 "
charging_symbol = "🔌 "
discharging_symbol = "⚡ "

[[battery.display]]
threshold = 20
style = "bold red"

[aws]
symbol = "  "
[gcloud]
symbol = "  "
[kubernetes]
symbol = "☸ "
disabled = false
format = '[$symbol$context( \($namespace\))]($style) '
